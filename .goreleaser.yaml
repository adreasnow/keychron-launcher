version: 2
project_name: keychron-launcher

# ---------------------------------------------------------------------------
# Build the macOS .app bundle with nativefier and inject custom app resources.
# ---------------------------------------------------------------------------
before:
  hooks:
    - >-
      npx nativefier
      --name "Keychron Launcher"
      --electron-version 39.2.7
      --browserwindow-options '{"webPreferences":{"experimentalFeatures":true}}'
      --icon icon.icns
      --fast-quit
      --honest
      --enable-features=WebHID
      --disable-dev-tools
      "https://launcher.keychron.com"
    - rm -rf "Keychron Launcher-darwin-arm64/Keychron Launcher.app/Contents/Resources/app"
    - cp -r app "Keychron Launcher-darwin-arm64/Keychron Launcher.app/Contents/Resources/app"

# ---------------------------------------------------------------------------
# Build a tiny Go stub so the archive carries darwin/arm64 metadata through
# the archive → homebrew_casks pipeline.
# ---------------------------------------------------------------------------
builds:
  - id: app-bundle
    main: ./main.go
    binary: keychron-launcher
    goos:
      - darwin
    goarch:
      - arm64

# ---------------------------------------------------------------------------
# Zip the .app bundle into a proper archive.
# The Go stub binary is included automatically but is harmless.
# homebrew_casks picks this up because it carries goos/goarch metadata.
# ---------------------------------------------------------------------------
archives:
  - id: app-archive
    ids:
      - app-bundle
    formats:
      - zip
    strip_binary_directory: true
    name_template: "Keychron-Launcher_{{ .Os }}_{{ .Arch }}"
    files:
      - src: "Keychron Launcher-darwin-arm64/Keychron Launcher.app/**/*"
        dst: "Keychron Launcher.app"

changelog:
  sort: asc

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  name_template: "v{{ .Version }}"

# ---------------------------------------------------------------------------
# Publish a Homebrew Cask to adreasnow/homebrew-tap
# ---------------------------------------------------------------------------
homebrew_casks:
  - name: keychron-launcher
    ids:
      - app-archive
    custom_block: |
      app "Keychron Launcher.app"
    repository:
      owner: adreasnow
      name: homebrew-tap
      token: "{{ .Env.TAPS_KEY }}"
    homepage: "https://github.com/adreasnow/keychron-launcher"
    description: "Keychron Launcher electron app"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/Keychron Launcher.app"]
    uninstall:
      quit:
        - "com.electron.keychron-launcher"
    zap:
      trash:
        - "~/Library/Application Support/Keychron Launcher"
        - "~/Library/Caches/Keychron Launcher"
        - "~/Library/Preferences/com.electron.keychron-launcher.plist"